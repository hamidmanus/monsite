<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>grOmarcO – Grossiste Lunettes Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --cream: #FAF8F4; --cream2: #F2EDE4; --sand: #E8DDD0; --gold: #B8963E; --gold2: #D4AF6A; --dark: #1A1410; --dark2: #2D2520; --text: #3D3530; --gray: #8A7F78; --white: #FFFFFF;
    }
    body { font-family: "Inter", sans-serif; background: var(--cream); color: var(--text); margin: 0; }
    nav { position: fixed; top: 0; width: 100%; height: 72px; background: white; border-bottom: 1px solid var(--sand); display: flex; align-items: center; justify-content: space-between; padding: 0 6%; z-index: 1000; }
    .hero { min-height: 80vh; padding: 100px 6% 0; display: flex; align-items: center; justify-content: space-between; gap: 4rem; }
  </style>
</head>
<body>
  <nav><div>grOmarcO</div></nav>
  <section class="hero">
    <div>
      <h1>Grossiste Lunettes Premium</h1>
      <p>Votre partenaire optique au Maroc.</p>
    </div>
  </section>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
